<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calvin Howard | English</title>
    <link rel="stylesheet" href="index.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap");
    </style>
  </head>
  <body>
    <header class="header_container">
      <div>
        <img id="cv_pic" src="./imgs/CV pic.jpeg" alt="cv_pic" />
      </div>

      <div class="header_data_container">
        <h1 id="header_name">Calvin Howard</h1>
        <h2 id="header_dev">Backend Junior Developer</h2>

        <div class="location_container">
          <img src="./imgs/localizacion.png" alt="location_icon" width="30px" />
          <h3>Bogota, Colombia</h3>
        </div>

        <div class="header_links_container">
          <button class="header_email_button">
            <a href="mailto:calvin.uhh@gmail.com">
              <img
                id="mail_logo"
                src="./imgs/icons8-mensaje-relleno-50.png"
                alt="mail_logo"
              />
            </a>
            <a id="email_a" href="mailto:calvin.uhh@gmail.com"
              >calvin.uhh@gmail.com
            </a>
          </button>

          <button class="info_buttons">
            <a href="./CV Calvin Howard.pdf" download="CV_Calvin_Howard">
              <img
                id="doc_icon"
                src="./imgs/icons8-documento-64.png"
                alt="doc_icon"
              />
            </a>
          </button>
        </div>
      </div>
    </header>

    <footer></footer>
  </body>
</html>
